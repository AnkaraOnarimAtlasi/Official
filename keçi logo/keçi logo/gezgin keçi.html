<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağır Abi Keçi</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #e0f7fa;
            overflow: hidden;
            font-family: sans-serif;
        }

        .icerik {
            padding: 50px;
            font-size: 24px;
            color: #333;
            max-width: 600px;
        }

        /* --- KEÇİ ANA KONTEYNERİ --- */
        #gezgin-keci {
            position: fixed;
            width: 120px;
            z-index: 9999;
            pointer-events: none;
            /* AYAR 1: Ekranda kayma süresi (2s -> 5s yapıldı) */
            transition: left 5s linear, top 5s linear; 
        }

        /* İç Taşıyıcı (Animasyon için) */
        .keci-govdesi {
            transform-origin: bottom center;
        }

        /* --- ANİMASYON DURUMLARI --- */
        
        /* 1. Yavaş Yalpalama Animasyonu */
        .yuruyor .keci-govdesi {
            /* AYAR 2: Yalpalama hızı (0.4s -> 0.8s yapıldı) */
            animation: yavas-pitir 0.8s infinite linear;
        }

        @keyframes yavas-pitir {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(5deg); } /* Zıplama mesafesi ve açısı da azaldı */
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(-5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* 2. Çimen Çiğneme Animasyonu (Aynı kaldı) */
        .duruyor .grass {
            transform-origin: 255px 385px; 
            animation: chew 0.3s infinite alternate ease-in-out;
        }

        @keyframes chew {
            from { transform: rotate(0deg); }
            to { transform: rotate(15deg); }
        }

        /* Yön döndürme */
        .saga-bak { transform: scaleX(-1); }
        .sola-bak { transform: scaleX(1); }

    </style>
</head>

    <div class="icerik">
        <h1>Ağırbaşlı Keçi</h1>
        <p>Bu keçi artık hayata daha sakin bakıyor. Ağır ağır yürüyor, tadını çıkara çıkara çiğniyor.</p>
    </div>

            </svg>
        </div>
    </div>

    <script>
        const keci = document.getElementById('gezgin-keci');
        
        let mevcutX = window.innerWidth / 2;
        let mevcutY = window.innerHeight / 2;
        keci.style.left = mevcutX + 'px';
        keci.style.top = mevcutY + 'px';

        function keciHareketEt() {
            const hedefX = Math.random() * (window.innerWidth - 150);
            const hedefY = Math.random() * (window.innerHeight - 150);

            if (hedefX > mevcutX) {
                keci.classList.remove('sola-bak');
                keci.classList.add('saga-bak');
            } else {
                keci.classList.remove('saga-bak');
                keci.classList.add('sola-bak');
            }

            keci.classList.remove('duruyor');
            keci.classList.add('yuruyor');

            keci.style.left = hedefX + 'px';
            keci.style.top = hedefY + 'px';

            mevcutX = hedefX;
            mevcutY = hedefY;

            // AYAR 3: JavaScript bekleme süresi (2000 -> 5000 yapıldı)
            // Bu süre CSS transition süresiyle (5s) AYNI olmalıdır.
            setTimeout(() => {
                keci.classList.remove('yuruyor');
                keci.classList.add('duruyor');

                const beklemeSuresi = (Math.random() * 4000) + 3000; // Durma süresini de biraz artırdım (3-7 sn)
                setTimeout(keciHareketEt, beklemeSuresi);

            }, 5000); 
        }

        setTimeout(keciHareketEt, 1000);
    </script>

</html>
